<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .cover{width:1200px;height:630px;position:relative;background:#111110;font-family:'Inter',Arial,sans-serif;color:#fff;overflow:hidden}
  .glow1{position:absolute;width:760px;height:760px;left:-200px;top:-280px;background:radial-gradient(circle,rgba(66,133,244,.30),transparent 62%)}
  .glow2{position:absolute;width:680px;height:680px;right:-220px;bottom:-280px;background:radial-gradient(circle,rgba(251,188,5,.16),transparent 62%)}
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(circle at 28% 42%,#000,transparent 74%)}
  .in{position:absolute;inset:0;padding:62px 72px;display:flex;flex-direction:column;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:13px}
  .brand img{width:44px;height:44px}
  .brand span{font-weight:800;font-size:23px;letter-spacing:-.02em}
  .brand span i{color:#9C9B97;font-style:normal}
  .pill{display:inline-flex;align-items:center;gap:10px;align-self:flex-start;border:1px solid #3a3a37;background:rgba(255,255,255,.03);border-radius:999px;padding:9px 18px;font-size:14px;font-weight:600;color:#cfceca;letter-spacing:.05em}
  .pill .dot{width:9px;height:9px;border-radius:50%;background:#2ecc71;box-shadow:0 0 12px #2ecc71}
  h1{font-size:120px;font-weight:900;letter-spacing:-.045em;line-height:.92;margin:20px 0 18px}
  h1 b{color:#FBBC05}
  .sub{font-size:35px;font-weight:700;line-height:1.18;letter-spacing:-.02em;max-width:680px;color:#eceae6}
  .sub u{color:#4285F4;text-decoration:none}
  .feats{display:flex;gap:28px;font-size:19px;font-weight:600;color:#a7a6a1}
  .feats b{color:#fff}
  .chat{position:absolute;right:66px;top:150px;width:336px;background:#1A1A19;border:1px solid #2B2B29;border-radius:18px;padding:18px 20px;box-shadow:0 34px 90px -22px rgba(0,0,0,.75)}
  .chat .h{font-size:12.5px;color:#6b6a66;font-weight:800;letter-spacing:.07em;margin-bottom:13px}
  .chat .m{font-size:16px;line-height:1.34;background:#232322;border-radius:12px;padding:10px 13px;margin-bottom:9px}
  .chat .m.me{background:rgba(66,133,244,.16);border:1px solid rgba(66,133,244,.32)}
  .chat .sc{display:inline-block;margin-top:3px;background:rgba(46,204,113,.14);color:#2ecc71;border:1px solid rgba(46,204,113,.35);font-weight:700;font-size:14px;border-radius:999px;padding:5px 13px}
</style>
</head>
<body>
  <div class="cover">
    <div class="glow1"></div><div class="glow2"></div><div class="grid"></div>
    <div class="chat">
      <div class="h">⚔️ БОЙ · КЛИЕНТ «СКЕПТИК»</div>
      <div class="m">Дорого. У конкурентов дешевле.</div>
      <div class="m me">А сравниваете с ценой или с результатом?</div>
      <span class="sc">+8 · коуч</span>
    </div>
    <div class="in">
      <div class="brand"><img src="newlogo-mark.png" alt=""><span>TTT<i>Marketing</i></span></div>
      <div>
        <span class="pill"><span class="dot"></span> ИИ-ТРЕНАЖЁР ПРОДАЖ · РАБОТАЕТ В БРАУЗЕРЕ</span>
        <h1>Sales<b>PRO</b></h1>
        <div class="sub">Хватит учить менеджеров <u>на живых клиентах</u></div>
      </div>
      <div class="feats"><span>⚔️ <b>15-мин</b> бой с ИИ-клиентом</span><span>🏆 <b>10</b> рангов</span><span>🚀 запуск за <b>1 день</b></span></div>
    </div>
  </div>
</body>
</html>
